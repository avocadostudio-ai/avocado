name: Main gate

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.10.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm test:unit
      - run: pnpm --filter @ai-site-editor/orchestrator test:integration
      - name: E2E tests
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: pnpm test:e2e

  planner-eval:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.10.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Planner eval (core tags, regression gate)
        working-directory: apps/orchestrator
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          E2E_CHAT_PROVIDER: openai
          E2E_CHAT_MODEL_KEY: balanced
          OPENAI_MODEL_BALANCED: gpt-4.1
        run: pnpm eval --tags core --concurrency 3 --min-score 0.70
      - name: Upload eval report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: planner-eval-report
          path: apps/orchestrator/.data/evals/planner/*.json
          if-no-files-found: ignore
