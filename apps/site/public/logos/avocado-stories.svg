<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" role="img" aria-labelledby="title desc">
  <title id="title">Avocado Stories logo</title>
  <desc id="desc">Avocado with an open storybook motif on the pit.</desc>
  <defs>
    <radialGradient id="storyskin" cx="35%" cy="25%">
      <stop offset="0" stop-color="#bbf7d0"/>
      <stop offset="0.5" stop-color="#4ade80"/>
      <stop offset="1" stop-color="#166534"/>
    </radialGradient>
  </defs>
  <rect x="4" y="4" width="88" height="88" rx="20" fill="#f0fdf4"/>
  <!-- avocado body -->
  <path d="M48 14c-14 0-26 13-26 30 0 18 11 34 26 34s26-16 26-34c0-17-12-30-26-30z" fill="url(#storyskin)" stroke="#166534" stroke-width="2.5"/>
  <!-- inner flesh ring -->
  <circle cx="48" cy="50" r="16" fill="#fef9c3" opacity="0.5"/>
  <!-- pit -->
  <circle cx="48" cy="50" r="10" fill="#92400e"/>
  <!-- open book on pit -->
  <path d="M40 49c2-1.5 5-1.5 7 0v7c-2-1.5-5-1.5-7 0z" fill="#fef3c7" stroke="#fef3c7" stroke-width="0.3"/>
  <path d="M56 49c-2-1.5-5-1.5-7 0v7c2-1.5 5-1.5 7 0z" fill="#fef3c7" stroke="#fef3c7" stroke-width="0.3"/>
  <line x1="48" y1="49.2" x2="48" y2="56" stroke="#92400e" stroke-width="0.8"/>
  <!-- page lines -->
  <line x1="42" y1="51" x2="46" y2="51" stroke="#92400e" stroke-width="0.5" opacity="0.6"/>
  <line x1="42" y1="53" x2="46" y2="53" stroke="#92400e" stroke-width="0.5" opacity="0.6"/>
  <line x1="50" y1="51" x2="54" y2="51" stroke="#92400e" stroke-width="0.5" opacity="0.6"/>
  <line x1="50" y1="53" x2="54" y2="53" stroke="#92400e" stroke-width="0.5" opacity="0.6"/>
  <!-- leaf -->
  <path d="M48 14c2-4 8-7 14-6-3 5-8 8-14 6z" fill="#16a34a"/>
</svg>
