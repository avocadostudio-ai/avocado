<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="50%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="block1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f472b6"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <linearGradient id="block2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
    <linearGradient id="block3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <linearGradient id="block4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="block5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fb923c"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.15"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="url(#bg)" rx="0"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.08" stroke="#fff" stroke-width="1">
    <line x1="0" y1="100" x2="800" y2="100"/>
    <line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="400" x2="800" y2="400"/>
    <line x1="0" y1="500" x2="800" y2="500"/>
    <line x1="100" y1="0" x2="100" y2="600"/>
    <line x1="200" y1="0" x2="200" y2="600"/>
    <line x1="300" y1="0" x2="300" y2="600"/>
    <line x1="400" y1="0" x2="400" y2="600"/>
    <line x1="500" y1="0" x2="500" y2="600"/>
    <line x1="600" y1="0" x2="600" y2="600"/>
    <line x1="700" y1="0" x2="700" y2="600"/>
  </g>

  <!-- Decorative circles in background -->
  <circle cx="650" cy="80" r="60" fill="#fff" opacity="0.06"/>
  <circle cx="120" cy="520" r="90" fill="#fff" opacity="0.05"/>
  <circle cx="700" cy="480" r="40" fill="#fff" opacity="0.07"/>

  <!-- Floating block: top-left (pink) -->
  <g filter="url(#shadow)" transform="rotate(-8 160 140)">
    <rect x="100" y="90" width="120" height="100" rx="16" fill="url(#block1)"/>
    <rect x="118" y="116" width="50" height="6" rx="3" fill="#fff" opacity="0.8"/>
    <rect x="118" y="130" width="70" height="4" rx="2" fill="#fff" opacity="0.5"/>
    <rect x="118" y="140" width="60" height="4" rx="2" fill="#fff" opacity="0.5"/>
    <rect x="118" y="154" width="30" height="10" rx="5" fill="#fff" opacity="0.7"/>
  </g>

  <!-- Floating block: center-top (sky blue) -->
  <g filter="url(#shadow)" transform="rotate(5 420 120)">
    <rect x="350" y="60" width="140" height="120" rx="16" fill="url(#block2)"/>
    <circle cx="420" cy="100" r="16" fill="#fff" opacity="0.3"/>
    <rect x="370" y="126" width="80" height="6" rx="3" fill="#fff" opacity="0.8"/>
    <rect x="370" y="140" width="100" height="4" rx="2" fill="#fff" opacity="0.5"/>
    <rect x="370" y="150" width="60" height="4" rx="2" fill="#fff" opacity="0.5"/>
  </g>

  <!-- Floating block: right (orange) -->
  <g filter="url(#shadow)" transform="rotate(-3 640 240)">
    <rect x="570" y="180" width="140" height="120" rx="16" fill="url(#block5)"/>
    <rect x="590" y="204" width="100" height="8" rx="4" fill="#fff" opacity="0.85"/>
    <rect x="590" y="222" width="80" height="4" rx="2" fill="#fff" opacity="0.5"/>
    <rect x="590" y="232" width="90" height="4" rx="2" fill="#fff" opacity="0.5"/>
    <rect x="590" y="242" width="70" height="4" rx="2" fill="#fff" opacity="0.5"/>
    <rect x="590" y="262" width="40" height="12" rx="6" fill="#fff" opacity="0.7"/>
  </g>

  <!-- Main stacked blocks cluster (center) -->
  <!-- Bottom block (green) -->
  <g filter="url(#shadow)" transform="rotate(2 380 420)">
    <rect x="260" y="370" width="240" height="100" rx="18" fill="url(#block3)"/>
    <rect x="286" y="396" width="120" height="7" rx="3.5" fill="#fff" opacity="0.85"/>
    <rect x="286" y="412" width="180" height="5" rx="2.5" fill="#fff" opacity="0.5"/>
    <rect x="286" y="424" width="160" height="5" rx="2.5" fill="#fff" opacity="0.5"/>
    <rect x="286" y="436" width="140" height="5" rx="2.5" fill="#fff" opacity="0.5"/>
  </g>

  <!-- Middle block (yellow) -->
  <g filter="url(#shadow)" transform="rotate(-4 340 310)">
    <rect x="220" y="260" width="240" height="100" rx="18" fill="url(#block4)"/>
    <rect x="246" y="282" width="60" height="7" rx="3.5" fill="#fff" opacity="0.85"/>
    <rect x="246" y="298" width="180" height="5" rx="2.5" fill="#fff" opacity="0.5"/>
    <rect x="246" y="310" width="150" height="5" rx="2.5" fill="#fff" opacity="0.5"/>
    <rect x="246" y="322" width="100" height="5" rx="2.5" fill="#fff" opacity="0.5"/>
    <rect x="246" y="336" width="50" height="12" rx="6" fill="#fff" opacity="0.7"/>
  </g>

  <!-- Small floating block: bottom-right (pink) -->
  <g filter="url(#shadow)" transform="rotate(10 660 440)">
    <rect x="600" y="400" width="110" height="80" rx="14" fill="url(#block1)" opacity="0.9"/>
    <rect x="618" y="420" width="40" height="5" rx="2.5" fill="#fff" opacity="0.8"/>
    <rect x="618" y="432" width="70" height="4" rx="2" fill="#fff" opacity="0.5"/>
    <rect x="618" y="442" width="55" height="4" rx="2" fill="#fff" opacity="0.5"/>
  </g>

  <!-- Small floating block: left-center (blue) -->
  <g filter="url(#shadow)" transform="rotate(6 110 330)">
    <rect x="60" y="290" width="100" height="80" rx="14" fill="url(#block2)" opacity="0.85"/>
    <circle cx="110" cy="318" r="10" fill="#fff" opacity="0.3"/>
    <rect x="78" y="338" width="60" height="4" rx="2" fill="#fff" opacity="0.6"/>
    <rect x="78" y="348" width="45" height="4" rx="2" fill="#fff" opacity="0.4"/>
  </g>

  <!-- Connection lines between blocks -->
  <g stroke="#fff" stroke-width="1.5" opacity="0.15" stroke-dasharray="6 4">
    <line x1="220" y1="190" x2="350" y2="130"/>
    <line x1="490" y1="180" x2="570" y2="210"/>
    <line x1="340" y1="360" x2="310" y2="310"/>
    <line x1="500" y1="420" x2="600" y2="430"/>
    <line x1="160" y1="370" x2="260" y2="400"/>
  </g>

  <!-- Sparkle dots -->
  <circle cx="300" cy="50" r="3" fill="#fff" opacity="0.6"/>
  <circle cx="560" cy="140" r="2.5" fill="#fff" opacity="0.5"/>
  <circle cx="180" cy="240" r="2" fill="#fff" opacity="0.4"/>
  <circle cx="520" cy="350" r="3" fill="#fff" opacity="0.5"/>
  <circle cx="720" cy="350" r="2" fill="#fff" opacity="0.45"/>
  <circle cx="80" cy="150" r="2.5" fill="#fff" opacity="0.35"/>
  <circle cx="750" cy="550" r="2" fill="#fff" opacity="0.4"/>

  <!-- Title text -->
  <text x="400" y="556" text-anchor="middle" fill="#fff" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="700" letter-spacing="0.05em" opacity="0.9">BUILDING WITH BLOCKS</text>
  <text x="400" y="578" text-anchor="middle" fill="#fff" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="400" letter-spacing="0.1em" opacity="0.5">COMPOSABLE · TYPED · PORTABLE</text>
</svg>
